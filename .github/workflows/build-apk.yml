name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build APK with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tap-reward-apk
        path: bin/*.apk
